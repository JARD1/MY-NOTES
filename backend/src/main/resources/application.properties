# ==============================================================
# SERVER CONFIGURATION
# ==============================================================
server.port=8080

# ==============================================================
# DATABASE CONFIGURATION (MySQL)
# Using environment variables with default fallback values 
# so it works locally for you and for the Ensolvers reviewer.
# Added 'createDatabaseIfNotExist=true' to auto-create the DB.
# ==============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/${DB_NAME:notes_db}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:30805661lol.}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================================================
# HIBERNATE / JPA CONFIGURATION
# ==============================================================
# Automatically update the database schema based on Java entities
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in the console (useful for debugging)
spring.jpa.show-sql=true

# Specify the MySQL dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect